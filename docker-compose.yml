version: '3.9'

services:

  # ── Message broker ────────────────────────────────────────────────────────────
  activemq:
    image: apache/activemq-classic:5.18.3
    ports:
      - "61616:61616"   # OpenWire (JMS)
      - "61613:61613"   # STOMP — what our Node services use
      - "8161:8161"     # Admin UI → http://localhost:8161  (admin/admin)
                        #   Here you can see /topic/market.data,
                        #   subscriber count, message rates, browse messages
    restart: unless-stopped

  # ── Connects to Binance live WebSocket, publishes into the topic ─────────────
  binance-producer:
    build: ./services/binance-producer
    environment:
      - ACTIVEMQ_HOST=activemq
      - ACTIVEMQ_PORT=61613
    volumes:
      - ./services/binance-producer/src:/app/src
    depends_on:
      - activemq
    restart: unless-stopped

  # ── Subscribes to topic, broadcasts to all WebSocket clients ─────────────────
  graph-consumer:
    build: ./services/graph-consumer
    ports:
      - "3002:3002"
    environment:
      - ACTIVEMQ_HOST=activemq
      - ACTIVEMQ_PORT=61613
      - PORT=3002
    volumes:
      - ./services/graph-consumer/src:/app/src
    depends_on:
      - activemq
    restart: unless-stopped

  # ── Satellite data generator (PSD/CAF simulation) ────────────────────────────
  satellite-producer:
    build: ./services/satellite-producer
    environment:
      - ACTIVEMQ_HOST=activemq
      - ACTIVEMQ_PORT=61613
      - PUBLISH_INTERVAL_MS=100
    volumes:
      - ./services/satellite-producer/src:/app/src
    depends_on:
      - activemq
    restart: unless-stopped

  # ── DSP service: normalizes raw data, sends binary Float32 to frontend ────────
  dsp-service:
    build: ./services/dsp-service
    ports:
      - "3004:3004"
    environment:
      - ACTIVEMQ_HOST=activemq
      - ACTIVEMQ_PORT=61613
      - PORT=3004
    volumes:
      - ./services/dsp-service/src:/app/src
    depends_on:
      - activemq
    restart: unless-stopped

  # ── Reads from /queue/large.trades, exposes REST API ─────────────────────────
  trade-worker:
    build: ./services/trade-worker
    ports:
      - "3003:3003"
    environment:
      - ACTIVEMQ_HOST=activemq
      - ACTIVEMQ_PORT=61613
      - PORT=3003
    volumes:
      - ./services/trade-worker/src:/app/src
    depends_on:
      - activemq
    restart: unless-stopped

  # ── React frontend ────────────────────────────────────────────────────────────
  frontend:
    build: ./services/frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_WS_URL=ws://localhost:3002
      - VITE_WORKER_URL=http://localhost:3003
      - VITE_DSP_URL=ws://localhost:3004
    volumes:
      - ./services/frontend/src:/app/src
      - ./services/frontend/index.html:/app/index.html
    depends_on:
      - graph-consumer
    restart: unless-stopped
