version: '3.9'

services:

  # ── Message broker ────────────────────────────────────────────────────────────
  activemq:
    image: apache/activemq-classic:5.18.3
    ports:
      - "61616:61616"   # OpenWire (JMS)
      - "61613:61613"   # STOMP — what our Node services use
      - "8161:8161"     # Admin UI → http://localhost:8161  (admin/admin)
                        #   Here you can see /topic/market.data,
                        #   subscriber count, message rates, browse messages
    restart: unless-stopped

  # ── Connects to Binance live WebSocket, publishes into the topic ─────────────
  binance-producer:
    build: ./services/binance-producer
    environment:
      - ACTIVEMQ_HOST=activemq
      - ACTIVEMQ_PORT=61613
    volumes:
      - ./services/binance-producer/src:/app/src
    depends_on:
      - activemq
    restart: unless-stopped

  # ── Subscribes to topic, broadcasts to all WebSocket clients ─────────────────
  graph-consumer:
    build: ./services/graph-consumer
    ports:
      - "3002:3002"
    environment:
      - ACTIVEMQ_HOST=activemq
      - ACTIVEMQ_PORT=61613
      - PORT=3002
    volumes:
      - ./services/graph-consumer/src:/app/src
    depends_on:
      - activemq
    restart: unless-stopped

  # ── React frontend ────────────────────────────────────────────────────────────
  frontend:
    build: ./services/frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_WS_URL=ws://localhost:3002
    volumes:
      - ./services/frontend/src:/app/src
      - ./services/frontend/index.html:/app/index.html
    depends_on:
      - graph-consumer
    restart: unless-stopped
